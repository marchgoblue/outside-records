<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/outside-records/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Outside Records — Launching…</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; align-items: center; justify-content: center;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: #f6f8fb; color: #1d2a3a;
      }
      .card { text-align: center; }
      .spinner {
        width: 44px; height: 44px; margin: 0 auto 18px;
        border: 4px solid #dbe4f0; border-top-color: #2563eb;
        border-radius: 50%; animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      h1 { font-size: 18px; font-weight: 600; margin: 0 0 6px; }
      p { font-size: 14px; color: #5b6b7f; margin: 0; }
      .err { color: #b42318; max-width: 460px; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="spinner" id="spinner"></div>
      <h1>Outside Records</h1>
      <p id="status">Connecting to the EHR…</p>
    </div>
    <script type="module" src="/src/launch.js"></script>
  </body>
</html>
